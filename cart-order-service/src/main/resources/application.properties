spring.application.name=CART-ORDER-SERVICE
server.port=8082

# ===============================
# LOGGERS
# ===============================

logging.level.com.Arjun.MyMarket.cart_order=DEBUG
#logging.level.root=DEBUG

# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/cart-order-db
spring.datasource.username=Arjun
spring.datasource.password=dummy
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# EUREKA CONFIGURATION
# ===============================

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ===============================
# SERVICS URL
# ===============================

services.product.base-url=http://localhost:8081